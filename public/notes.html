<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Notes - Markdown note taking">
    <link rel="stylesheet" href="/index.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Frijole&family=Poppins:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <title>Notes</title>
</head>

<body>
    <header>
        <div class="top-header">
            <img class="logo-img" src="/images/candle-logo.png" alt="site logo">
            <nav id="main-navigation">
                <ul role="list">
                    <li role="listitem"><a href="/">Home</a></li>
                    <li role="listitem"><a href="/habits.html">Habits</a></li>
                    <li role="listitem"><a href="/notes.html">Notes</a></li>
                </ul>
            </nav>
        </div>
        <div class="site-header">
            <a href="/" class="site-title-page">Habit & Note Tracker</a>
        </div>
    </header>

    <main class="notes-main">
        <h1 class="page-title">My Notes</h1>

        <div class="notes-container">
            <div class="notes-sidebar">
                <button id="newNoteBtn" class="new-note-btn">+ New Note</button>
                <div id="notesList" class="notes-list">
                </div>
            </div>

            <div class="note-editor">
                <div id="emptyState" class="empty-state">
                    <p>Select a note or create a new one</p>
                </div>
                <div id="editorArea" class="editor-area" style="display: none;">
                    <input type="text" id="noteTitle" class="note-title-input" placeholder="Note title">
                    <textarea id="noteContent" class="note-content-textarea" placeholder="Write your note in Markdown...

**Bold text** or __Bold text__
*Italic text* or _Italic text_
# Heading 1
## Heading 2
- List item
1. Numbered list
[Link text](url)"></textarea>
                    <div class="editor-actions">
                        <button id="saveNoteBtn" class="save-btn">Save</button>
                        <button id="deleteNoteBtn" class="delete-btn">Delete</button>
                        <button id="cancelEditBtn" class="cancel-btn">Cancel</button>
                    </div>
                </div>
            </div>

            <div class="note-preview">
                <h3>Preview</h3>
                <div id="markdownPreview" class="markdown-preview">
                    <p>Preview will appear here...</p>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; Habit & Note Tracker. All rights reserved.</p>
    </footer>
    <script type="module" src="/notes.js"></script>
</body>

</html>
