<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Habit Tracker - Track your daily habits">
    <link rel="stylesheet" href="/index.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Frijole&family=Poppins:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <title>Habit Tracker</title>
</head>

<body>
    <header>
        <div class="top-header">
            <img class="logo-img" src="/images/candle-logo.png" alt="site logo">
            <nav id="main-navigation">
                <ul role="list">
                    <li role="listitem"><a href="/">Home</a></li>
                    <li role="listitem"><a href="/habits.html">Habits</a></li>
                    <li role="listitem"><a href="/notes.html">Notes</a></li>
                </ul>
            </nav>
        </div>
        <div class="site-header">
            <a href="/" class="site-title-page">Habit & Note Tracker</a>
        </div>
    </header>

    <main class="habits-main">
        <h1 class="page-title">My Habits</h1>

        <div class="habit-add-section">
            <h2>Add New Habit</h2>
            <form id="habitForm">
                <div class="form-row">
                    <div class="form-group">
                        <label for="habitName">Habit Name:</label>
                        <input type="text" id="habitName" name="habitName" placeholder="e.g., Morning Exercise" required>
                    </div>
                    <div class="form-group">
                        <label for="habitFrequency">Frequency:</label>
                        <select id="habitFrequency" name="habitFrequency">
                            <option value="daily">Daily</option>
                            <option value="weekly">Weekly</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label for="habitDescription">Description:</label>
                    <input type="text" id="habitDescription" name="habitDescription" placeholder="Optional description">
                </div>
                <button type="submit" class="submit-btn">Add Habit</button>
            </form>
        </div>

        <div class="habits-list-section">
            <h2>Track Your Habits</h2>
            <div id="habitsList" class="habits-list">
            </div>
        </div>

        <div class="habit-history-section">
            <h2>Recent Activity</h2>
            <div id="habitHistory" class="habit-history">
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; Habit & Note Tracker. All rights reserved.</p>
    </footer>
    <script type="module" src="/habits.js"></script>
</body>

</html>
